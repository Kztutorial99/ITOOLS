name: 🚀 Release Il2CppDumper

on:
  push:
    tags:
      - 'il2cpp-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (contoh: 6.1.0)'
        required: true
        default: '6.1.0'
      prerelease:
        description: 'Pre-release?'
        required: false
        default: 'false'
        type: boolean

jobs:
  release:
    name: 📦 Create/Update Release
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=il2cpp-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#il2cpp-v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAG=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Info build
        run: |
          echo "=== INFO BUILD ==="
          echo "Version  : ${{ steps.version.outputs.VERSION }}"
          echo "Tag      : ${{ steps.version.outputs.TAG }}"
          echo "Triggered: ${{ github.event_name }}"
          echo "Runner OS: $(uname -a)"

      - name: 📋 Validate folder structure
        run: |
          echo "=== CEK STRUKTUR FOLDER ==="
          find il2cppDumper/ -type f | sort
          echo "✅ Struktur folder OK"

      - name: 🏷️ Create Git Tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.TAG }}" 2>/dev/null || echo "Tag sudah ada, lanjut..."
          git push origin "${{ steps.version.outputs.TAG }}" 2>/dev/null || echo "Tag push dilewati"

      - name: 📝 Generate Release Notes
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          cat > release_notes.md << NOTES
          ## 📦 Il2CppDumper v${{ steps.version.outputs.VERSION }}

          ### 🆕 Info Build
          - Build date: ${BUILD_DATE}
          - Triggered by: ${{ github.event_name }}

          ### 📥 Cara Download & Install
          1. Download \`Il2cppDumper_${{ steps.version.outputs.VERSION }}.apk\` di bawah
          2. Enable **Unknown Sources** di Android Settings
          3. Install APK
          4. Baca [SETUP.md](https://github.com/${{ github.repository }}/blob/main/il2cppDumper/SETUP.md) untuk panduan lengkap

          ### ⚙️ Persyaratan
          - Android 7.0+ (API 24)
          - Storage: min 500MB
          - Arsitektur: arm64-v8a / armeabi-v7a
          NOTES
          echo "✅ Release notes dibuat"
          cat release_notes.md

      - name: 🔎 Cek release sudah ada atau belum
        id: check_release
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.TAG }}")
          RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          if [ -n "$RELEASE_ID" ]; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT
            echo "ℹ️  Release sudah ada (ID: $RELEASE_ID) — akan update"
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Release belum ada — akan buat baru"
          fi

      - name: 🆕 Buat Release baru (jika belum ada)
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "🛠️ Il2CppDumper v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Update Release yang sudah ada
        if: steps.check_release.outputs.RELEASE_EXISTS == 'true'
        run: |
          BODY=$(cat release_notes.md | jq -Rs .)
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.check_release.outputs.RELEASE_ID }}" \
            -d "{\"body\":$BODY}" | grep -o '"id":[0-9]*' | head -1
          echo "✅ Release berhasil diupdate"

      - name: ✅ Done
        run: |
          echo "==========================="
          echo "✅ RELEASE SELESAI"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo "==========================="
